{% extends 'base.html' %}

{% block content %}
    <h1 style="margin-top: 0px;">About</h1>
    <p>jPoll je jednoduchá anketní aplikace vytvořená v rámci zadání. Umožňuje uživatelům odpovídat na jednu hlavní otázku dne a prohlížet si sdílené výsledky.</p>

    <h1 style="margin-top: 40px;">Report an error</h1>
    <p>Pokud jste narazili na chybu, prosím napište nám.</p>
    
    <form action="{{ url_for('about') }}" method="POST">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea name="message" class="form-control" rows="5" placeholder="i have encountered a bug..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send</button>
    </form>
{% endblock %}
