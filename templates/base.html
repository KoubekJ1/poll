<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jPoll</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        .navbar { background-color: #fff; padding: 15px 50px; border-bottom: 1px solid #c4c4c4; display: flex; align-items: center; }
        .navbar h2 { margin: 0; margin-right: 30px; }
        .navbar a { text-decoration: none; color: #333; margin-right: 20px; font-size: 20px; }
        .navbar .user-icon { margin-left: auto; }
        .container { max-width: 800px; margin: 50px auto; background: #fff; padding: 40px; border: 1px solid #c4c4c4; }
        .btn { padding: 10px 20px; font-size: 17px; border: none; border-radius: 5px; cursor: pointer; color: #fff; font-weight: bold; }
        .btn-primary { background-color: #008cff; }
        .btn-logout { background-color: #dc3545; }
        .flash { padding: 10px; margin-bottom: 20px; border-radius: 4px; }
        .flash.success { background-color: #d4edda; color: #155724; }
        .flash.danger { background-color: #f8d7da; color: #721c24; }
        .flash.warning { background-color: #fff3cd; color: #856404; }
        .form-group { margin-bottom: 15px; }
        .form-control { width: 100%; padding: 10px; font-size: 17px; border: 1px solid #999; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>jPoll</h2>
        <a href="{{ url_for('today') }}">Today's poll</a>
        <a href="{{ url_for('about') }}">About</a>
        <div class="user-icon">
            {% if session.user_id %}
                <a href="{{ url_for('logout') }}" class="btn btn-logout" style="color: white; font-size: 14px;">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}">👤</a>
            {% endif %}
        </div>
    </div>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
