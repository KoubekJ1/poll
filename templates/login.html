{% extends 'base.html' %}

{% block content %}
    <div style="max-width: 400px; margin: 0 auto; border: 1px solid #999; padding: 20px; border-radius: 5px;">
        <h3 style="margin-top: 0;">Sign In</h3>
        <hr style="border-top: 2px solid #ddeeff; margin-bottom: 20px;">
        <form action="{{ url_for('api_user_login') }}" method="POST">
            <div class="form-group">
                <label>User Email:</label>
                <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" class="form-control" placeholder="********" required>
            </div>
            <button type="submit" class="btn btn-primary" style="background-color: #66bbff;">SIGN IN</button>
        </form>

        <h3 style="margin-top: 40px;">New User</h3>
        <hr style="border-top: 2px solid #ddeeff; margin-bottom: 20px;">
        <form action="{{ url_for('api_user_register') }}" method="POST">
            <div class="form-group">
                <label>User Email:</label>
                <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" class="form-control" placeholder="********" required>
            </div>
            <button type="submit" class="btn btn-primary" style="background-color: #66bbff;">SIGN UP</button>
        </form>
    </div>
{% endblock %}
